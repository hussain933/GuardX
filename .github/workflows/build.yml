name: GuardX APK Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
          mkdir -p gradle_temp
          unzip -q gradle-8.1.1-bin.zip -d gradle_temp
          gradle_temp/gradle-8.1.1/bin/gradle wrapper
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: GuardX-APK
          path: app/build/outputs/apk/debug/*.apk
